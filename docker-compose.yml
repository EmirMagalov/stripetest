services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
  frontend:
    build:
      context: .
      dockerfile: Dockerfile-vue
      args:
        - VITE_API_URL=${VITE_API_URL}
        - VITE_MEDIA_URL=${VITE_MEDIA_URL}
    env_file:
      - ./frontend/.env.development
    ports:
      - "8080:80"
    volumes:
      # Проверь эту строку:
      - ./media:/app/media
    depends_on:
      - db

  backend:
    build:
      context: .
      dockerfile: Dockerfile-django
    container_name: django
    #    command: python stripe_integration_tz/manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./media:/app/media
    env_file:
      - .env

volumes:
  postgres_data:
