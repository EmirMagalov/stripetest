server {
    listen 80;
    server_name localhost;

    # 1. Раздача фронтенда (уже есть)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 2. ДОБАВЛЯЕМ раздачу медиа
    location /media/ {
        alias /app/media/; # Путь ВНУТРИ контейнера фронтенда
        autoindex on;
    }
}