server {
    listen 80;
    server_name localhost;

    # 1. Раздача фронтенда
    location / {
        root /usr/share/nginx/html;
        index index.html;
        # Это критически важно для Vue Router:
        # Если путь не найден, Nginx отдаст index.html, и Vue сам разберется с маршрутом
        try_files $uri $uri/ /index.html;
    }

    # 2. Проксирование запросов к Django
    location /api/ {
        proxy_pass http://backend:8000; # 'backend' — это имя сервиса из docker-compose
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. Статика Django (админка)
    location /static/ {
        alias /app/static/;
    }
}