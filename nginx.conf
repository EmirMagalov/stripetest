server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /media/ {
        # Ссылка на бэкенд (используем http, чтобы избежать петли)
        proxy_pass http://stripetest-production-1be8.up.railway.app/media/;
        
        proxy_set_header Host stripetest-production-1be8.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https; # Говорим Django, что всё ок, это HTTPS

        proxy_redirect off;
    }
}